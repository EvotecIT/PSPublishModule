<VirtualHost *:80>
    ServerName __DOMAIN__
    ServerAlias www.__DOMAIN__
    DocumentRoot /var/www/__SITE_ID__/site/current

    <Directory /var/www/__SITE_ID__/site/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    DirectoryIndex index.html
    ErrorDocument 404 /404.html
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge/
    RewriteRule ^ https://__DOMAIN__%{REQUEST_URI} [END,NE,R=permanent]
    ErrorLog ${APACHE_LOG_DIR}/__SITE_ID__-error.log
    CustomLog ${APACHE_LOG_DIR}/__SITE_ID__-access.log combined
</VirtualHost>
