<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName __DOMAIN__
__SERVER_ALIAS__
    DocumentRoot /var/www/__SITE_ID__/site/current

    <Directory /var/www/__SITE_ID__/site/current>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    DirectoryIndex index.html
    ErrorDocument 404 /404.html
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    <FilesMatch "\.(?:png|jpg|jpeg|svg|ico|css|js|json|xml|webp|avif)$">
        Header set Cache-Control "public, max-age=604800"
    </FilesMatch>
    <Location "/_powerforge/deployment.json">
        Header always set Cache-Control "no-store"
    </Location>
    ErrorLog ${APACHE_LOG_DIR}/__SITE_ID__-error.log
    CustomLog ${APACHE_LOG_DIR}/__SITE_ID__-access.log combined
    Include /etc/letsencrypt/options-ssl-apache.conf
    SSLCertificateFile /etc/letsencrypt/live/__DOMAIN__/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/__DOMAIN__/privkey.pem
</VirtualHost>
</IfModule>
