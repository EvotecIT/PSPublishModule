name: Capture Server Recovery

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: __SITE_ID__-server-recovery-backup-production
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    steps:
      - name: Capture and publish encrypted recovery state
        uses: EvotecIT/PSPublishModule/.github/actions/powerforge-server-backup@__ENGINE_REF__
        with:
          manifest-path: deploy/linux/__SITE_ID__.serverrecovery.json
          capture-user: powerforge-__SITE_ID__-backup
          server-host: ${{ secrets.DEPLOYMENT_HOST }}
          server-ssh-private-key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          server-ssh-known-hosts: ${{ secrets.SERVER_SSH_KNOWN_HOSTS }}
          backup-repository-ssh-private-key: ${{ secrets.BACKUP_REPOSITORY_SSH_PRIVATE_KEY }}
          backup-repository-ssh-known-hosts: ${{ secrets.BACKUP_REPOSITORY_SSH_KNOWN_HOSTS }}
