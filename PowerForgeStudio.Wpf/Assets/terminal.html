<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0F1117; }
  #terminal { width: 100%; height: 100%; }
  .xterm { padding: 8px; }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css"/>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
</head>
<body>
<div id="terminal"></div>
<script>
(function() {
    const term = new Terminal({
        cursorBlink: true,
        cursorStyle: 'bar',
        fontFamily: 'Cascadia Code, Cascadia Mono, Consolas, Courier New, monospace',
        fontSize: 13,
        lineHeight: 1.2,
        theme: {
            background: '#0F1117',
            foreground: '#B8BDD0',
            cursor: '#3B82F6',
            cursorAccent: '#0F1117',
            selectionBackground: '#3B82F640',
            selectionForeground: '#E8ECF4',
            black: '#1C1F2E',
            red: '#EF4444',
            green: '#10B981',
            yellow: '#F59E0B',
            blue: '#3B82F6',
            magenta: '#A855F7',
            cyan: '#06B6D4',
            white: '#B8BDD0',
            brightBlack: '#6B7280',
            brightRed: '#F87171',
            brightGreen: '#34D399',
            brightYellow: '#FBBF24',
            brightBlue: '#60A5FA',
            brightMagenta: '#C084FC',
            brightCyan: '#22D3EE',
            brightWhite: '#E8ECF4'
        }
    });

    const fitAddon = new FitAddon.FitAddon();
    const webLinksAddon = new WebLinksAddon.WebLinksAddon();
    term.loadAddon(fitAddon);
    term.loadAddon(webLinksAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();

    // Input: user types → send to C# as base64
    term.onData(function(data) {
        var bytes = new TextEncoder().encode(data);
        var b64 = btoa(String.fromCharCode.apply(null, bytes));
        window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data: b64 }));
    });

    // Binary input (paste, etc.)
    term.onBinary(function(data) {
        var b64 = btoa(data);
        window.chrome.webview.postMessage(JSON.stringify({ type: 'input', data: b64 }));
    });

    // Output: C# sends base64 output via postMessage
    window.chrome.webview.addEventListener('message', function(e) {
        var b64 = e.data;
        var binary = atob(b64);
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        term.write(bytes);
    });

    // Resize: fit addon calculates dimensions, send back to C#
    function sendResize() {
        fitAddon.fit();
        var dims = { type: 'resize', cols: term.cols, rows: term.rows };
        window.chrome.webview.postMessage(JSON.stringify(dims));
    }

    var resizeTimer = null;
    new ResizeObserver(function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(sendResize, 50);
    }).observe(document.getElementById('terminal'));

    // Initial resize after a brief delay for layout
    setTimeout(sendResize, 100);

    // Make term accessible for debugging
    window._term = term;
    window._fitAddon = fitAddon;
})();
</script>
</body>
</html>
