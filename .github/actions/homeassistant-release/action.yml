name: PowerForge Home Assistant Release
description: Plan, version, package, publish, resume, and verify a Home Assistant or HACS release.

inputs:
  repository-root:
    description: Checked-out Home Assistant or HACS repository root.
    required: true
  repository:
    description: GitHub repository in owner/name form.
    required: true
  pr-number:
    description: Merged pull request number that initiated the release.
    required: true
  merge-sha:
    description: Expected pull request merge commit SHA.
    required: false
    default: ""
  default-branch:
    description: Branch that receives the version-only release commit.
    required: false
    default: main
  increment:
    description: Optional auto, none, patch, minor, or major override.
    required: false
    default: auto
  github-token:
    description: Token used to push the version commit and publish the GitHub release.
    required: true
  powerforge-version:
    description: Exact PowerForge.Build tool version used by the action.
    required: false
    default: "1.0.2"

outputs:
  action:
    description: Release action taken by PowerForge.
    value: ${{ steps.release.outputs.action }}
  version:
    description: Released or planned version.
    value: ${{ steps.release.outputs.version }}
  tag:
    description: Released or planned tag.
    value: ${{ steps.release.outputs.tag }}
  release-url:
    description: Published or reused GitHub release URL.
    value: ${{ steps.release.outputs.release-url }}

runs:
  using: composite
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4.3.1
      with:
        dotnet-version: 10.0.x

    - name: Install PowerForge CLI
      shell: pwsh
      run: |
        $toolPath = Join-Path $env:RUNNER_TEMP 'powerforge-homeassistant-tools'
        dotnet tool install --tool-path $toolPath PowerForge.Build --version $env:INPUT_POWERFORGE_VERSION
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
        INPUT_POWERFORGE_VERSION: ${{ inputs.powerforge-version }}

    - name: Release and verify
      id: release
      shell: pwsh
      run: |
        $ErrorActionPreference = 'Stop'
        $tool = Join-Path $env:RUNNER_TEMP 'powerforge-homeassistant-tools/powerforge'
        $arguments = @(
          'homeassistant', 'release',
          '--repository-root', $env:INPUT_REPOSITORY_ROOT,
          '--repo', $env:INPUT_REPOSITORY,
          '--pr-number', $env:INPUT_PR_NUMBER,
          '--default-branch', $env:INPUT_DEFAULT_BRANCH,
          '--increment', $env:INPUT_INCREMENT,
          '--apply', '--publish', '--output', 'json'
        )
        if (-not [string]::IsNullOrWhiteSpace($env:INPUT_MERGE_SHA)) {
          $arguments += @('--merge-sha', $env:INPUT_MERGE_SHA)
        }

        $output = & $tool @arguments
        if ($LASTEXITCODE -ne 0) {
          $output | ForEach-Object { Write-Host $_ }
          exit $LASTEXITCODE
        }

        $result = ($output -join [Environment]::NewLine) | ConvertFrom-Json
        if (-not $result.success) {
          throw "PowerForge release failed: $($result.error)"
        }

        "action=$($result.result.action)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "version=$($result.result.releaseVersion)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "tag=$($result.result.tagName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        "release-url=$($result.result.releaseUrl)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

        @"
        ## PowerForge Home Assistant release

        - Action: $($result.result.action)
        - Repository type: $($result.result.repositoryKind)
        - Version: $($result.result.releaseVersion)
        - Tag: $($result.result.tagName)
        - Release: $($result.result.releaseUrl)
        - Detail: $($result.result.message)
        "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_REPOSITORY_ROOT: ${{ inputs.repository-root }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        INPUT_MERGE_SHA: ${{ inputs.merge-sha }}
        INPUT_DEFAULT_BRANCH: ${{ inputs.default-branch }}
        INPUT_INCREMENT: ${{ inputs.increment }}
