name: PowerForge GitHub Housekeeping
description: Clean GitHub Actions caches and runner working sets using PowerForge.Cli.

inputs:
  apply:
    description: When true, apply deletions. When false, run in dry-run mode.
    required: false
    default: "true"
  cleanup-runner:
    description: When true, clean local runner working sets.
    required: false
    default: "true"
  cleanup-artifacts:
    description: When true, prune GitHub Actions artifacts for the repository.
    required: false
    default: "true"
  cleanup-caches:
    description: When true, prune GitHub Actions caches for the repository.
    required: false
    default: "true"
  repo:
    description: Repository in owner/repo format. Defaults to the current repository.
    required: false
    default: ""
  github-token:
    description: Token used for GitHub cache cleanup. Defaults to github.token.
    required: false
    default: ""
  min-free-gb:
    description: Minimum free disk required after runner cleanup.
    required: false
    default: "20"
  runner-aggressive-threshold-gb:
    description: Free disk threshold below which aggressive runner cleanup is enabled.
    required: false
    default: ""
  allow-sudo:
    description: Allow sudo for deleting protected directories on Unix runners.
    required: false
    default: "false"
  cache-keep:
    description: Number of newest caches to keep per cache key.
    required: false
    default: "1"
  cache-max-age-days:
    description: Minimum cache age before deletion is allowed.
    required: false
    default: "14"
  cache-max-delete:
    description: Maximum number of caches to delete in one run.
    required: false
    default: "200"
  cache-key:
    description: Optional cache key include patterns (comma-separated).
    required: false
    default: ""
  cache-exclude:
    description: Optional cache key exclude patterns (comma-separated).
    required: false
    default: ""
  artifact-keep:
    description: Number of newest artifacts to keep per artifact name.
    required: false
    default: "5"
  artifact-max-age-days:
    description: Minimum artifact age before deletion is allowed.
    required: false
    default: "7"
  artifact-max-delete:
    description: Maximum number of artifacts to delete in one run.
    required: false
    default: "200"
  artifact-name:
    description: Optional artifact include patterns (comma-separated).
    required: false
    default: ""
  artifact-exclude:
    description: Optional artifact exclude patterns (comma-separated).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: ${{ github.action_path }}/../../global.json

    - name: Build PowerForge CLI
      shell: pwsh
      run: |
        $repoRoot = (Resolve-Path (Join-Path $env:GITHUB_ACTION_PATH "../..")).Path
        $project = Join-Path $repoRoot "PowerForge.Cli/PowerForge.Cli.csproj"
        dotnet build $project -c Release
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

    - name: Cleanup runner working sets
      if: ${{ inputs.cleanup-runner == 'true' }}
      shell: pwsh
      run: |
        $repoRoot = (Resolve-Path (Join-Path $env:GITHUB_ACTION_PATH "../..")).Path
        $project = Join-Path $repoRoot "PowerForge.Cli/PowerForge.Cli.csproj"

        $args = @(
          'run', '--project', $project, '-c', 'Release', '--no-build', '--',
          'github', 'runner', 'cleanup'
        )

        if ('${{ inputs.apply }}' -eq 'true') { $args += '--apply' } else { $args += '--dry-run' }
        if ('${{ inputs.min-free-gb }}') { $args += @('--min-free-gb', '${{ inputs.min-free-gb }}') }
        if ('${{ inputs.runner-aggressive-threshold-gb }}') { $args += @('--aggressive-threshold-gb', '${{ inputs.runner-aggressive-threshold-gb }}') }
        if ('${{ inputs.allow-sudo }}' -eq 'true') { $args += '--allow-sudo' }

        dotnet @args
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1

    - name: Cleanup GitHub caches
      if: ${{ inputs.cleanup-caches == 'true' }}
      shell: pwsh
      run: |
        $repoRoot = (Resolve-Path (Join-Path $env:GITHUB_ACTION_PATH "../..")).Path
        $project = Join-Path $repoRoot "PowerForge.Cli/PowerForge.Cli.csproj"

        $repository = '${{ inputs.repo }}'
        if ([string]::IsNullOrWhiteSpace($repository)) { $repository = '${{ github.repository }}' }

        $token = $env:POWERFORGE_GITHUB_TOKEN
        if ([string]::IsNullOrWhiteSpace($token)) {
          Write-Error 'GitHub token is required for cache cleanup.'
          exit 1
        }

        $args = @(
          'run', '--project', $project, '-c', 'Release', '--no-build', '--',
          'github', 'caches', 'prune',
          '--repo', $repository,
          '--token', $token,
          '--keep', '${{ inputs.cache-keep }}',
          '--max-age-days', '${{ inputs.cache-max-age-days }}',
          '--max-delete', '${{ inputs.cache-max-delete }}'
        )

        if ('${{ inputs.apply }}' -eq 'true') { $args += '--apply' } else { $args += '--dry-run' }
        if ('${{ inputs.cache-key }}') { $args += @('--key', '${{ inputs.cache-key }}') }
        if ('${{ inputs.cache-exclude }}') { $args += @('--exclude', '${{ inputs.cache-exclude }}') }

        dotnet @args
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
        POWERFORGE_GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}

    - name: Cleanup GitHub artifacts
      if: ${{ inputs.cleanup-artifacts == 'true' }}
      shell: pwsh
      run: |
        $repoRoot = (Resolve-Path (Join-Path $env:GITHUB_ACTION_PATH "../..")).Path
        $project = Join-Path $repoRoot "PowerForge.Cli/PowerForge.Cli.csproj"

        $repository = '${{ inputs.repo }}'
        if ([string]::IsNullOrWhiteSpace($repository)) { $repository = '${{ github.repository }}' }

        $token = $env:POWERFORGE_GITHUB_TOKEN
        if ([string]::IsNullOrWhiteSpace($token)) {
          Write-Error 'GitHub token is required for artifact cleanup.'
          exit 1
        }

        $args = @(
          'run', '--project', $project, '-c', 'Release', '--no-build', '--',
          'github', 'artifacts', 'prune',
          '--repo', $repository,
          '--token', $token,
          '--keep', '${{ inputs.artifact-keep }}',
          '--max-age-days', '${{ inputs.artifact-max-age-days }}',
          '--max-delete', '${{ inputs.artifact-max-delete }}'
        )

        if ('${{ inputs.apply }}' -eq 'true') { $args += '--apply' } else { $args += '--dry-run' }
        if ('${{ inputs.artifact-name }}') { $args += @('--name', '${{ inputs.artifact-name }}') }
        if ('${{ inputs.artifact-exclude }}') { $args += @('--exclude', '${{ inputs.artifact-exclude }}') }

        dotnet @args
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      env:
        DOTNET_NOLOGO: true
        DOTNET_CLI_TELEMETRY_OPTOUT: 1
        POWERFORGE_GITHUB_TOKEN: ${{ inputs.github-token != '' && inputs.github-token || github.token }}
