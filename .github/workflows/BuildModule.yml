# This is a basic workflow to help you get started with Actions

name: Test & Build Module

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events for the default branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  DependencyAudit:
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: NuGet vulnerability audit (informational)
        shell: pwsh
        continue-on-error: true
        run: dotnet list ./PSPublishModule.sln package --vulnerable --include-transitive
  WindowsBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","windows"]' || '["windows-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify net472 compatibility
        shell: pwsh
        timeout-minutes: 10
        run: |
          dotnet build .\PowerForge\PowerForge.csproj -c Release -f net472 --nologo
          dotnet build .\PowerForge.PowerShell\PowerForge.PowerShell.csproj -c Release -f net472 --nologo
          dotnet build .\PSPublishModule\PSPublishModule.csproj -c Release -f net472 --nologo

      - name: Run net472 C# smoke tests
        shell: pwsh
        timeout-minutes: 10
        run: dotnet test .\PowerForge.Net472SmokeTests\PowerForge.Net472SmokeTests.csproj -c Release -f net472 --nologo

      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Windows PowerShell 5.1
        shell: pwsh
        timeout-minutes: 10
        run: |
          & "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File .\PSPublishModule.Tests.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test with PowerShell 7
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
  LinuxBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Pester
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
  MacOsBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","macOS"]' || '["macos-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Pester
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
