# This is a basic workflow to help you get started with Actions

name: Test & Build Module

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events for the default branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      privateGalleryLiveValidation:
        description: Run the opt-in live Azure Artifacts private gallery validation job.
        required: true
        default: false
        type: boolean
      privateGalleryOrganization:
        description: Azure DevOps organization name for live validation.
        required: false
        type: string
      privateGalleryProject:
        description: Optional Azure DevOps project name for project-scoped feeds.
        required: false
        type: string
      privateGalleryFeed:
        description: Azure Artifacts feed name for live validation.
        required: false
        type: string
      privateGalleryModuleName:
        description: Existing module name to install/update from the feed.
        required: false
        type: string
      privateGalleryProfileName:
        description: Temporary PSPublishModule profile name used during validation.
        required: true
        default: LiveAzureArtifacts
        type: string
      privateGalleryGenerateDisposablePackage:
        description: Also publish a generated disposable NuGet package to prove package push.
        required: true
        default: false
        type: boolean
      privateGalleryDisposablePackageName:
        description: Disposable package ID used when package-push proof is enabled.
        required: true
        default: PSPublishModule.PrivateGallery.LiveValidation
        type: string
      privateGalleryDisposablePackageVersion:
        description: Optional disposable package version. Leave blank for timestamped version.
        required: false
        type: string
      privateGalleryRunnerLabels:
        description: JSON array of runner labels. Prefer a self-hosted Windows runner with Azure Artifacts auth policy.
        required: true
        default: '["self-hosted","windows"]'
        type: string

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  DependencyAudit:
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: NuGet vulnerability audit (informational)
        shell: pwsh
        continue-on-error: true
        run: dotnet list ./PSPublishModule.sln package --vulnerable --include-transitive
  PrivateGalleryLiveValidation:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.privateGalleryLiveValidation == true }}
    runs-on: ${{ fromJSON(inputs.privateGalleryRunnerLabels) }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build PSPublishModule
        shell: pwsh
        timeout-minutes: 15
        run: .\Build\Build-Module.ps1

      - name: Run live Azure Artifacts validation
        shell: pwsh
        timeout-minutes: 15
        env:
          AZDO_ORGANIZATION: ${{ inputs.privateGalleryOrganization }}
          AZDO_PROJECT: ${{ inputs.privateGalleryProject }}
          AZDO_FEED: ${{ inputs.privateGalleryFeed }}
          AZDO_MODULE_NAME: ${{ inputs.privateGalleryModuleName }}
          AZDO_PROFILE_NAME: ${{ inputs.privateGalleryProfileName }}
          AZDO_GENERATE_DISPOSABLE_PACKAGE: ${{ inputs.privateGalleryGenerateDisposablePackage }}
          AZDO_DISPOSABLE_PACKAGE_NAME: ${{ inputs.privateGalleryDisposablePackageName }}
          AZDO_DISPOSABLE_PACKAGE_VERSION: ${{ inputs.privateGalleryDisposablePackageVersion }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:AZDO_ORGANIZATION)) { $missing += 'privateGalleryOrganization' }
          if ([string]::IsNullOrWhiteSpace($env:AZDO_FEED)) { $missing += 'privateGalleryFeed' }
          if ([string]::IsNullOrWhiteSpace($env:AZDO_MODULE_NAME)) { $missing += 'privateGalleryModuleName' }
          if ($missing.Count -gt 0) {
              throw "Private gallery live validation is enabled, but required workflow input(s) are missing: $($missing -join ', ')."
          }

          $outputRoot = Join-Path $PWD 'live-validation-output'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null

          $arguments = @{
              Organization       = $env:AZDO_ORGANIZATION
              Feed               = $env:AZDO_FEED
              ModuleName         = $env:AZDO_MODULE_NAME
              ProfileName        = $env:AZDO_PROFILE_NAME
              OutputFile         = Join-Path $outputRoot 'private-gallery-live.xml'
              EvidenceFile       = Join-Path $outputRoot 'private-gallery-live.evidence.json'
              ModuleManifestPath = Join-Path $PWD 'Module\PSPublishModule.psd1'
              Output             = 'Detailed'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:AZDO_PROJECT)) {
              $arguments.Project = $env:AZDO_PROJECT
          }

          if ($env:AZDO_GENERATE_DISPOSABLE_PACKAGE -eq 'true') {
              $arguments.GenerateDisposablePackage = $true
              $arguments.DisposablePackageName = $env:AZDO_DISPOSABLE_PACKAGE_NAME
              if (-not [string]::IsNullOrWhiteSpace($env:AZDO_DISPOSABLE_PACKAGE_VERSION)) {
                  $arguments.DisposablePackageVersion = $env:AZDO_DISPOSABLE_PACKAGE_VERSION
              }
          }

          .\Module\Tests\Invoke-PrivateGalleryAzureArtifactsLiveValidation.ps1 @arguments

      - name: Summarize live validation evidence
        if: always()
        shell: pwsh
        run: |
          $evidencePath = Join-Path $PWD 'live-validation-output\private-gallery-live.evidence.json'
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_STEP_SUMMARY)) {
              return
          }

          .\Module\Tests\Convert-PrivateGalleryLiveEvidenceToMarkdown.ps1 -EvidenceFile $evidencePath |
              Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Upload live validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-gallery-live-validation
          path: live-validation-output
          if-no-files-found: warn
          retention-days: 14
  WindowsBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","windows"]' || '["windows-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Verify net472 compatibility
        shell: pwsh
        timeout-minutes: 10
        run: |
          dotnet build .\PowerForge\PowerForge.csproj -c Release -f net472 --nologo
          dotnet build .\PowerForge.PowerShell\PowerForge.PowerShell.csproj -c Release -f net472 --nologo
          dotnet build .\PSPublishModule\PSPublishModule.csproj -c Release -f net472 --nologo

      - name: Run net472 C# smoke tests
        shell: pwsh
        timeout-minutes: 10
        run: dotnet test .\PowerForge.Net472SmokeTests\PowerForge.Net472SmokeTests.csproj -c Release -f net472 --nologo

      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Windows PowerShell 5.1
        shell: pwsh
        timeout-minutes: 10
        run: |
          & "$env:SystemRoot\System32\WindowsPowerShell\v1.0\powershell.exe" -NoProfile -ExecutionPolicy Bypass -File .\PSPublishModule.Tests.ps1
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Test with PowerShell 7
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
  LinuxBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","linux"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Pester
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
  MacOsBuild:
    # The type of runner that the job will run on
    # Prefer private/self-hosted runners for private repos to reduce hosted spend.
    runs-on: ${{ fromJSON(github.event.repository.private && '["self-hosted","macOS"]' || '["macos-latest"]') }}
    timeout-minutes: 15

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-
      - name: Build Module
        shell: pwsh
        timeout-minutes: 10
        run: .\Build\Build-Module.ps1

      - name: Test with Pester
        shell: pwsh
        timeout-minutes: 10
        run: .\PSPublishModule.Tests.ps1
