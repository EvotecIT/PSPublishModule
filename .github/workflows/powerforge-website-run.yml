name: PowerForge Website Run

on:
  workflow_call:
    inputs:
      website_root:
        required: true
        type: string
      pipeline_config:
        required: true
        type: string
      engine_mode:
        required: false
        type: string
        default: "source"
      runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      timeout_minutes:
        required: false
        type: number
        default: 20
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-reports"
      powerforge_lock_path:
        required: false
        type: string
        default: ""
      powerforge_repository:
        required: false
        type: string
        default: ""
      powerforge_ref:
        required: false
        type: string
        default: ""
      powerforge_repository_override:
        required: false
        type: string
        default: ""
      powerforge_ref_override:
        required: false
        type: string
        default: ""
      powerforge_tool_lock_path:
        required: false
        type: string
        default: ""
      pipeline_mode:
        required: false
        type: string
        default: "ci"
      use_playwright_cache:
        required: false
        type: boolean
        default: true
      maintenance_mode_note:
        required: false
        type: boolean
        default: false
    secrets:
      indexnow_key:
        required: false

jobs:
  website-run:
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - name: Checkout website
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ github.token }}

      - name: Resolve shared workflow source
        id: workflow_source
        shell: pwsh
        run: |
          $workflowRef = [string]'${{ github.workflow_ref }}'
          if ($workflowRef -notmatch '^(?<repository>[^/]+/[^/]+)/\.github/workflows/[^@]+@(?<ref>.+)$') {
            throw "Unable to parse github.workflow_ref: '$workflowRef'"
          }

          "repository=$($Matches.repository)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$($Matches.ref)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout shared PowerForge runner
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: ./.powerforge-runner
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Cache NuGet packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Initialize Playwright cache directory
        if: ${{ inputs.use_playwright_cache }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PLAYWRIGHT_BROWSERS_PATH}"

      - name: Run website pipeline
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
          INDEXNOW_KEY: ${{ secrets.indexnow_key }}
        run: |
          $runnerArgs = @(
            'website-runner',
            '--website-root', '${{ inputs.website_root }}',
            '--pipeline-config', '${{ inputs.pipeline_config }}',
            '--engine-mode', '${{ inputs.engine_mode }}',
            '--pipeline-mode', '${{ inputs.pipeline_mode }}',
            '--powerforge-lock-path', '${{ inputs.powerforge_lock_path }}',
            '--powerforge-repository', '${{ inputs.powerforge_repository }}',
            '--powerforge-ref', '${{ inputs.powerforge_ref }}',
            '--powerforge-repository-override', '${{ inputs.powerforge_repository_override }}',
            '--powerforge-ref-override', '${{ inputs.powerforge_ref_override }}',
            '--powerforge-tool-lock-path', '${{ inputs.powerforge_tool_lock_path }}'
          )

          if ('${{ inputs.maintenance_mode_note }}' -eq 'true') {
            $runnerArgs += '--maintenance-note'
          }

          dotnet run --framework net10.0 --project ./.powerforge-runner/PowerForge.Web.Cli -- $runnerArgs

      - name: Upload website reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ inputs.report_artifact_name }}
          path: |
            ./${{ inputs.website_root }}/_reports/**
            ./${{ inputs.website_root }}/_site/_reports/**
          if-no-files-found: ignore

      - name: Cleanup Playwright cache
        if: ${{ always() && inputs.use_playwright_cache }}
        shell: bash
        run: |
          if [ -n "${PLAYWRIGHT_BROWSERS_PATH:-}" ] && [ -d "${PLAYWRIGHT_BROWSERS_PATH}" ]; then
            rm -rf "${PLAYWRIGHT_BROWSERS_PATH}"
          fi
