name: PowerForge Website Run

on:
  workflow_call:
    outputs:
      source_sha:
        description: Exact caller repository commit used to build the website.
        value: ${{ jobs.website-run.outputs.source_sha }}
      engine_repository:
        description: Repository used to build the website.
        value: ${{ jobs.website-run.outputs.engine_repository }}
      engine_sha:
        description: Exact PowerForge commit used to build the website.
        value: ${{ jobs.website-run.outputs.engine_sha }}
      engine_mode:
        description: Resolved source or binary engine mode.
        value: ${{ jobs.website-run.outputs.engine_mode }}
      engine_ref:
        description: Exact source commit or binary release tag used to build.
        value: ${{ jobs.website-run.outputs.engine_ref }}
      engine_asset:
        description: Binary release asset used to build, when applicable.
        value: ${{ jobs.website-run.outputs.engine_asset }}
      engine_asset_sha256:
        description: Exact binary release asset digest, when applicable.
        value: ${{ jobs.website-run.outputs.engine_asset_sha256 }}
    inputs:
      website_root:
        required: true
        type: string
      pipeline_config:
        required: true
        type: string
      source_ref:
        description: Optional caller repository ref to build instead of the event commit.
        required: false
        type: string
        default: ""
      engine_mode:
        required: false
        type: string
        default: ""
      runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      timeout_minutes:
        required: false
        type: number
        default: 40
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      dotnet_workloads:
        description: Optional comma, semicolon, or whitespace-separated .NET workloads to install before running the website pipeline.
        required: false
        type: string
        default: ""
      report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-reports"
      powerforge_lock_path:
        required: false
        type: string
        default: ""
      powerforge_repository:
        required: false
        type: string
        default: ""
      powerforge_ref:
        required: false
        type: string
        default: ""
      powerforge_repository_override:
        required: false
        type: string
        default: ""
      powerforge_ref_override:
        required: false
        type: string
        default: ""
      powerforge_tool_lock_path:
        required: false
        type: string
        default: ""
      powerforge_web_tag:
        required: false
        type: string
        default: ""
      pipeline_mode:
        required: false
        type: string
        default: "ci"
      use_playwright_cache:
        required: false
        type: boolean
        default: true
      maintenance_mode_note:
        required: false
        type: boolean
        default: false
      upload_pages_artifact:
        required: false
        type: boolean
        default: false
      validate_pages_artifact:
        required: false
        type: boolean
        default: false
      pages_artifact_path:
        required: false
        type: string
        default: ""
      site_artifact_name:
        required: false
        type: string
        default: ""
      site_artifact_path:
        required: false
        type: string
        default: ""
      site_artifact_retention_days:
        required: false
        type: number
        default: 7
    secrets:
      indexnow_key:
        required: false
      repository_read_token:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  website-run:
    outputs:
      source_sha: ${{ steps.source_provenance.outputs.sha }}
      engine_repository: ${{ steps.engine_provenance.outputs.repository }}
      engine_sha: ${{ steps.engine_provenance.outputs.sha }}
      engine_mode: ${{ steps.engine_provenance.outputs.mode }}
      engine_ref: ${{ steps.engine_provenance.outputs.ref }}
      engine_asset: ${{ steps.engine_provenance.outputs.asset }}
      engine_asset_sha256: ${{ steps.engine_provenance.outputs.asset_sha256 }}
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    env:
      POWERFORGE_RUNNER_CACHE_ROOT: ${{ github.workspace }}/.cache/powerforge-runner
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/powerforge-runner/ms-playwright
      DOTNET_BUNDLE_EXTRACT_BASE_DIR: ${{ github.workspace }}/.cache/powerforge-runner/dotnet-bundle
      BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.cache/powerforge-runner/bun-install-cache
      NPM_CONFIG_CACHE: ${{ github.workspace }}/.cache/powerforge-runner/npm-cache
    steps:
      - name: Checkout website
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          # workflow_call can otherwise default to refs/pull/<n>/merge, which is not available in some repos.
          ref: ${{ inputs.source_ref || github.event.pull_request.head.sha || github.sha }}

      - name: Resolve website source provenance
        id: source_provenance
        shell: pwsh
        run: |
          $sourceSha = (git rev-parse HEAD).Trim().ToLowerInvariant()
          if ($sourceSha -notmatch '^[a-f0-9]{40,64}$') {
            throw "Unable to resolve the exact website source commit."
          }

          "sha=$sourceSha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Resolve shared workflow source
        id: workflow_source
        shell: pwsh
        run: |
          $resolvedRepository = [string]'${{ inputs.powerforge_repository }}'
          $resolvedRef = [string]'${{ inputs.powerforge_ref }}'
          $workflowRepository = [string]'${{ job.workflow_repository }}'
          $workflowRef = [string]'${{ job.workflow_ref }}'
          $workflowSha = [string]'${{ job.workflow_sha }}'

          if ([string]::IsNullOrWhiteSpace($resolvedRepository)) {
            $resolvedRepository = $workflowRepository
          }

          if ([string]::IsNullOrWhiteSpace($resolvedRepository)) {
            $resolvedRepository = 'EvotecIT/PSPublishModule'
          }

          if ([string]::IsNullOrWhiteSpace($resolvedRef)) {
            $resolvedRef = $workflowSha
          }

          if ([string]::IsNullOrWhiteSpace($resolvedRef)) {
            throw "Unable to resolve the shared workflow commit SHA from job.workflow_sha. Pass powerforge_ref explicitly."
          }

          Write-Host "Resolved shared workflow source from $workflowRef to $resolvedRepository@$resolvedRef"
          "repository=$resolvedRepository" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$resolvedRef" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout shared PowerForge runner
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.workflow_source.outputs.repository }}
          ref: ${{ steps.workflow_source.outputs.ref }}
          path: ./.powerforge-runner
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Install requested .NET workloads
        if: ${{ inputs.dotnet_workloads != '' }}
        shell: pwsh
        env:
          DOTNET_WORKLOADS: ${{ inputs.dotnet_workloads }}
        run: |
          $ErrorActionPreference = 'Stop'
          $workloads = @(
            $env:DOTNET_WORKLOADS -split '[,;\s]+' |
              Where-Object { -not [string]::IsNullOrWhiteSpace($_) } |
              Select-Object -Unique
          )

          if ($workloads.Count -eq 0) {
            throw 'dotnet_workloads did not contain a workload identifier.'
          }

          foreach ($workload in $workloads) {
            if ($workload -notmatch '^[A-Za-z0-9][A-Za-z0-9._-]*$') {
              throw "Invalid .NET workload identifier '$workload'."
            }
          }

          dotnet workload install @workloads --skip-manifest-update
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet workload install failed with exit code $LASTEXITCODE."
          }

      - name: Cache NuGet packages
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/powerforge-website-nuget-packages
          key: powerforge-website-nuget-v1-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.props', '**/*.targets', '**/packages.lock.json') }}
          restore-keys: |
            powerforge-website-nuget-v1-${{ runner.os }}-

      - name: Initialize transient tool cache directories
        shell: pwsh
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/powerforge-website-nuget-packages
        run: |
          foreach ($path in @(
            $env:POWERFORGE_RUNNER_CACHE_ROOT,
            $env:NUGET_PACKAGES,
            $env:PLAYWRIGHT_BROWSERS_PATH,
            $env:DOTNET_BUNDLE_EXTRACT_BASE_DIR,
            $env:BUN_INSTALL_CACHE_DIR,
            $env:NPM_CONFIG_CACHE
          )) {
            if (-not [string]::IsNullOrWhiteSpace($path)) {
              New-Item -ItemType Directory -Force -Path $path | Out-Null
            }
          }

      - name: Run website pipeline
        shell: pwsh
        env:
          NUGET_PACKAGES: ${{ runner.temp }}/powerforge-website-nuget-packages
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_PACKAGES_TOKEN: ${{ secrets.repository_read_token || github.token }}
          LICENSING_PACKAGES_TOKEN: ${{ secrets.repository_read_token || github.token }}
          LICENSING_PACKAGES_USERNAME: ${{ github.repository_owner }}
          INDEXNOW_KEY: ${{ secrets.indexnow_key }}
          POWERFORGE_REPOSITORY_TOKEN: ${{ secrets.repository_read_token }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.cloudflare_api_token }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.cloudflare_zone_id }}
          POWERFORGE_RUNNER_RESULT_PATH: ${{ runner.temp }}/powerforge-website-runner-result.json
        run: |
          $runnerArgs = @(
            'website-runner',
            '--website-root', '${{ inputs.website_root }}',
            '--pipeline-config', '${{ inputs.pipeline_config }}',
            '--engine-mode', '${{ inputs.engine_mode }}',
            '--pipeline-mode', '${{ inputs.pipeline_mode }}',
            '--powerforge-lock-path', '${{ inputs.powerforge_lock_path }}',
            '--powerforge-repository', '${{ inputs.powerforge_repository }}',
            '--powerforge-ref', '${{ inputs.powerforge_ref }}',
            '--powerforge-repository-override', '${{ inputs.powerforge_repository_override }}',
            '--powerforge-ref-override', '${{ inputs.powerforge_ref_override }}',
            '--powerforge-tool-lock-path', '${{ inputs.powerforge_tool_lock_path }}',
            '--powerforge-web-tag', '${{ inputs.powerforge_web_tag }}',
            '--result-path', $env:POWERFORGE_RUNNER_RESULT_PATH
          )

          if ('${{ inputs.maintenance_mode_note }}' -eq 'true') {
            $runnerArgs += '--maintenance-note'
          }

          dotnet run --framework net10.0 -p:RestoreLockedMode=false --project ./.powerforge-runner/PowerForge.Web.Cli/PowerForge.Web.Cli.csproj -- $runnerArgs

      - name: Resolve actual PowerForge engine provenance
        id: engine_provenance
        shell: pwsh
        env:
          POWERFORGE_RUNNER_RESULT_PATH: ${{ runner.temp }}/powerforge-website-runner-result.json
        run: |
          $ErrorActionPreference = 'Stop'
          if (-not (Test-Path -LiteralPath $env:POWERFORGE_RUNNER_RESULT_PATH -PathType Leaf)) {
            throw "Website runner result not found: $($env:POWERFORGE_RUNNER_RESULT_PATH)"
          }
          $result = Get-Content -LiteralPath $env:POWERFORGE_RUNNER_RESULT_PATH -Raw | ConvertFrom-Json
          $mode = [string]$result.engineMode
          $repository = [string]$result.repository
          if ($mode -notin @('source', 'binary')) {
            throw "Website runner returned unsupported engine mode '$mode'."
          }
          if ($repository -notmatch '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$') {
            throw "Website runner returned invalid engine repository '$repository'."
          }

          $ref = ''
          $sha = ''
          $asset = ''
          $assetSha256 = ''
          if ($mode -eq 'source') {
            $ref = [string]$result.ref
            if ($ref -notmatch '^[0-9a-fA-F]{40,64}$') {
              throw "Website runner returned invalid source engine commit '$ref'."
            }
            $ref = $ref.ToLowerInvariant()
            $sha = $ref
          } else {
            $ref = [string]$result.tag
            $asset = [string]$result.asset
            $assetSha256 = [string]$result.assetSha256
            if ([string]::IsNullOrWhiteSpace($ref) -or [string]::IsNullOrWhiteSpace($asset)) {
              throw 'Website runner did not report the binary release tag and asset.'
            }
            if ($assetSha256 -notmatch '^[0-9a-f]{64}$') {
              throw "Website runner returned invalid binary asset SHA-256 '$assetSha256'."
            }
          }

          "mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "repository=$repository" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "ref=$ref" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset=$asset" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "asset_sha256=$assetSha256" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload website reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.report_artifact_name }}
          path: |
            ./${{ inputs.website_root }}/_reports/**
            ./${{ inputs.website_root }}/_site/_reports/**
          if-no-files-found: ignore

      - name: Cleanup transient tool caches before site artifact
        if: ${{ inputs.upload_pages_artifact || inputs.validate_pages_artifact || inputs.site_artifact_name != '' }}
        shell: pwsh
        run: |
          $cacheRoot = [System.IO.Path]::GetFullPath($env:POWERFORGE_RUNNER_CACHE_ROOT)
          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE).TrimEnd([System.IO.Path]::DirectorySeparatorChar, [System.IO.Path]::AltDirectorySeparatorChar)
          $workspacePrefix = $workspace + [System.IO.Path]::DirectorySeparatorChar
          if ($cacheRoot.StartsWith($workspacePrefix, [System.StringComparison]::OrdinalIgnoreCase) -and (Test-Path -LiteralPath $cacheRoot)) {
            Remove-Item -LiteralPath $cacheRoot -Recurse -Force
          }

      - name: Archive site artifact
        if: ${{ (inputs.upload_pages_artifact || inputs.validate_pages_artifact || inputs.site_artifact_name != '') && runner.os == 'Linux' }}
        shell: sh
        env:
          SITE_ARTIFACT_PATH: ${{ inputs.site_artifact_path || inputs.pages_artifact_path || format('./{0}/_site', inputs.website_root) }}
        run: |
          echo "::group::Archive site artifact"
          tar \
            --dereference --hard-dereference \
            --directory "$SITE_ARTIFACT_PATH" \
            -cf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          echo "::endgroup::"

      - name: Archive site artifact
        if: ${{ (inputs.upload_pages_artifact || inputs.validate_pages_artifact || inputs.site_artifact_name != '') && runner.os == 'macOS' }}
        shell: sh
        env:
          SITE_ARTIFACT_PATH: ${{ inputs.site_artifact_path || inputs.pages_artifact_path || format('./{0}/_site', inputs.website_root) }}
        run: |
          echo "::group::Archive site artifact"
          gtar \
            --dereference --hard-dereference \
            --directory "$SITE_ARTIFACT_PATH" \
            -cf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
          echo "::endgroup::"

      - name: Archive site artifact
        if: ${{ (inputs.upload_pages_artifact || inputs.validate_pages_artifact || inputs.site_artifact_name != '') && runner.os == 'Windows' }}
        shell: pwsh
        env:
          SITE_ARTIFACT_PATH: ${{ inputs.site_artifact_path || inputs.pages_artifact_path || format('./{0}/_site', inputs.website_root) }}
        run: |
          Write-Host "::group::Archive site artifact"
          $resolvedArtifactPath = [System.IO.Path]::GetFullPath($env:SITE_ARTIFACT_PATH)
          if (-not (Test-Path -LiteralPath $resolvedArtifactPath)) {
            throw "Site artifact path not found: $resolvedArtifactPath"
          }

          $tempRoot = [System.IO.Path]::GetPathRoot($env:RUNNER_TEMP)
          $freeBytes = ([System.IO.DriveInfo]::new($tempRoot)).AvailableFreeSpace
          $sourceBytes = (Get-ChildItem -LiteralPath $resolvedArtifactPath -Recurse -Force -File | Measure-Object -Property Length -Sum).Sum
          $requiredBytes = [Math]::Max(1GB, [int64]($sourceBytes * 1.1))
          Write-Host ("Site artifact source: {0:n0} bytes; runner temp free: {1:n0} bytes; required estimate: {2:n0} bytes" -f $sourceBytes, $freeBytes, $requiredBytes)
          if ($freeBytes -lt $requiredBytes) {
            throw "Not enough free space on $tempRoot to archive Pages artifact. Free $freeBytes bytes, estimated need $requiredBytes bytes for $resolvedArtifactPath."
          }

          $tarArgs = @(
            '--dereference',
            '--directory',
            $resolvedArtifactPath,
            '-cf',
            (Join-Path $env:RUNNER_TEMP 'artifact.tar'),
            '--exclude=.git',
            '--exclude=.github',
            '.'
          )
          tar @tarArgs
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }
          Write-Host "::endgroup::"

      - name: Upload Pages artifact
        if: ${{ inputs.upload_pages_artifact }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Upload site artifact
        if: ${{ inputs.site_artifact_name != '' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.site_artifact_name }}
          path: ${{ runner.temp }}/artifact.tar
          retention-days: ${{ inputs.site_artifact_retention_days }}
          if-no-files-found: error

      - name: Cleanup transient tool caches
        if: ${{ always() }}
        shell: pwsh
        run: |
          $cacheRoot = [System.IO.Path]::GetFullPath($env:POWERFORGE_RUNNER_CACHE_ROOT)
          $workspace = [System.IO.Path]::GetFullPath($env:GITHUB_WORKSPACE).TrimEnd([System.IO.Path]::DirectorySeparatorChar, [System.IO.Path]::AltDirectorySeparatorChar)
          $workspacePrefix = $workspace + [System.IO.Path]::DirectorySeparatorChar
          if ($cacheRoot.StartsWith($workspacePrefix, [System.StringComparison]::OrdinalIgnoreCase) -and (Test-Path -LiteralPath $cacheRoot)) {
            Remove-Item -LiteralPath $cacheRoot -Recurse -Force
          }
