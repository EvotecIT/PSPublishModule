name: Private Gallery Live Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

on:
  workflow_dispatch:
    inputs:
      organization:
        description: Azure DevOps organization name. Falls back to PSPUBLISHMODULE_AZDO_ORGANIZATION variable.
        required: false
        type: string
      project:
        description: Optional Azure DevOps project name for project-scoped feeds. Falls back to PSPUBLISHMODULE_AZDO_PROJECT variable.
        required: false
        type: string
      feed:
        description: Azure Artifacts feed name. Falls back to PSPUBLISHMODULE_AZDO_FEED variable.
        required: false
        type: string
      moduleName:
        description: Existing module name to install/update from the feed. Falls back to PSPUBLISHMODULE_AZDO_MODULE_NAME variable.
        required: false
        type: string
      profileName:
        description: Temporary PSPublishModule profile name used during validation.
        required: false
        type: string
      generateDisposablePackage:
        description: Also publish a generated disposable NuGet package to prove package push.
        required: true
        default: false
        type: boolean
      disposablePackageName:
        description: Disposable package ID used when package-push proof is enabled.
        required: false
        type: string
      disposablePackageVersion:
        description: Optional disposable package version. Leave blank for timestamped version.
        required: false
        type: string
      runnerLabels:
        description: JSON array of runner labels. Defaults to PSPUBLISHMODULE_AZDO_RUNNER_LABELS variable or self-hosted Windows.
        required: false
        type: string

permissions:
  contents: read

jobs:
  AzureArtifactsLiveValidation:
    runs-on: ${{ fromJSON(inputs.runnerLabels || vars.PSPUBLISHMODULE_AZDO_RUNNER_LABELS || '["self-hosted","windows"]') }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: ${{ runner.os }}-nuget-${{ hashFiles('global.json', 'NuGet.config', '**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build PSPublishModule
        shell: pwsh
        timeout-minutes: 15
        run: .\Build\Build-Module.ps1

      - name: Run live Azure Artifacts validation
        shell: pwsh
        timeout-minutes: 15
        env:
          AZDO_ORGANIZATION: ${{ inputs.organization || vars.PSPUBLISHMODULE_AZDO_ORGANIZATION }}
          AZDO_PROJECT: ${{ inputs.project || vars.PSPUBLISHMODULE_AZDO_PROJECT }}
          AZDO_FEED: ${{ inputs.feed || vars.PSPUBLISHMODULE_AZDO_FEED }}
          AZDO_MODULE_NAME: ${{ inputs.moduleName || vars.PSPUBLISHMODULE_AZDO_MODULE_NAME }}
          AZDO_PROFILE_NAME: ${{ inputs.profileName || vars.PSPUBLISHMODULE_AZDO_PROFILE_NAME || 'LiveAzureArtifacts' }}
          AZDO_GENERATE_DISPOSABLE_PACKAGE: ${{ inputs.generateDisposablePackage }}
          AZDO_DISPOSABLE_PACKAGE_NAME: ${{ inputs.disposablePackageName || vars.PSPUBLISHMODULE_AZDO_DISPOSABLE_PACKAGE_NAME || 'PSPublishModule.PrivateGallery.LiveValidation' }}
          AZDO_DISPOSABLE_PACKAGE_VERSION: ${{ inputs.disposablePackageVersion || vars.PSPUBLISHMODULE_AZDO_DISPOSABLE_PACKAGE_VERSION }}
          ARTIFACTS_CREDENTIALPROVIDER_EXTERNAL_FEED_ENDPOINTS: ${{ secrets.PSPUBLISHMODULE_AZDO_ARTIFACTS_EXTERNAL_FEED_ENDPOINTS }}
          ARTIFACTS_CREDENTIALPROVIDER_FEED_ENDPOINTS: ${{ secrets.PSPUBLISHMODULE_AZDO_ARTIFACTS_FEED_ENDPOINTS }}
          VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: ${{ secrets.PSPUBLISHMODULE_AZDO_VSS_NUGET_EXTERNAL_FEED_ENDPOINTS }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:AZDO_ORGANIZATION)) { $missing += 'organization input or PSPUBLISHMODULE_AZDO_ORGANIZATION variable' }
          if ([string]::IsNullOrWhiteSpace($env:AZDO_FEED)) { $missing += 'feed input or PSPUBLISHMODULE_AZDO_FEED variable' }
          if ([string]::IsNullOrWhiteSpace($env:AZDO_MODULE_NAME)) { $missing += 'moduleName input or PSPUBLISHMODULE_AZDO_MODULE_NAME variable' }
          if ($missing.Count -gt 0) {
              throw "Private gallery live validation cannot start because required workflow input(s)/variable(s) are missing: $($missing -join ', ')."
          }

          $outputRoot = Join-Path $PWD 'live-validation-output'
          New-Item -ItemType Directory -Path $outputRoot -Force | Out-Null

          $arguments = @{
              Organization       = $env:AZDO_ORGANIZATION
              Feed               = $env:AZDO_FEED
              ModuleName         = $env:AZDO_MODULE_NAME
              ProfileName        = $env:AZDO_PROFILE_NAME
              OutputFile         = Join-Path $outputRoot 'private-gallery-live.xml'
              EvidenceFile       = Join-Path $outputRoot 'private-gallery-live.evidence.json'
              ModuleManifestPath = Join-Path $PWD 'Module\PSPublishModule.psd1'
              Output             = 'Detailed'
          }

          if (-not [string]::IsNullOrWhiteSpace($env:AZDO_PROJECT)) {
              $arguments.Project = $env:AZDO_PROJECT
          }

          if ($env:AZDO_GENERATE_DISPOSABLE_PACKAGE -eq 'true') {
              $arguments.GenerateDisposablePackage = $true
              $arguments.DisposablePackageName = $env:AZDO_DISPOSABLE_PACKAGE_NAME
              if (-not [string]::IsNullOrWhiteSpace($env:AZDO_DISPOSABLE_PACKAGE_VERSION)) {
                  $arguments.DisposablePackageVersion = $env:AZDO_DISPOSABLE_PACKAGE_VERSION
              }
          }

          .\Module\Tests\Invoke-PrivateGalleryAzureArtifactsLiveValidation.ps1 @arguments

      - name: Summarize live validation evidence
        if: always()
        shell: pwsh
        run: |
          $evidencePath = Join-Path $PWD 'live-validation-output\private-gallery-live.evidence.json'
          if ([string]::IsNullOrWhiteSpace($env:GITHUB_STEP_SUMMARY)) {
              return
          }

          .\Module\Tests\Convert-PrivateGalleryLiveEvidenceToMarkdown.ps1 -EvidenceFile $evidencePath |
              Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY

      - name: Upload live validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-gallery-live-validation
          path: live-validation-output
          if-no-files-found: warn
          retention-days: 14
