name: Server Recovery Validation Tests

on:
  push:
    branches: [main]
    paths:
      - ".github/actions/powerforge-server-recovery-validate/**"
      - ".github/workflows/server-recovery-validation-tests.yml"
      - "PowerForge.Tests/GitHubServerRecoveryValidation*.cs"
      - "PowerForge.Tests/ServerRecoverySecurityTests.cs"
      - "PowerForge.Tests/ServerScaffoldTests.cs"
      - "PowerForge.Web.Cli/ServerScaffoldTemplateStore.cs"
      - "PowerForge.Web.Cli/Templates/ServerScaffold/**"
      - "PowerForge.Web.Cli/WebCliCommandHandlers.Server*.cs"
      - "Schemas/powerforge.web.serverrecovery.schema.json"
  pull_request:
    paths:
      - ".github/actions/powerforge-server-recovery-validate/**"
      - ".github/workflows/server-recovery-validation-tests.yml"
      - "PowerForge.Tests/GitHubServerRecoveryValidation*.cs"
      - "PowerForge.Tests/ServerRecoverySecurityTests.cs"
      - "PowerForge.Tests/ServerScaffoldTests.cs"
      - "PowerForge.Web.Cli/ServerScaffoldTemplateStore.cs"
      - "PowerForge.Web.Cli/Templates/ServerScaffold/**"
      - "PowerForge.Web.Cli/WebCliCommandHandlers.Server*.cs"
      - "Schemas/powerforge.web.serverrecovery.schema.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ServerRecoveryValidationTests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          global-json-file: global.json

      - name: Restore focused test graph
        run: dotnet restore ./PowerForge.Tests/PowerForge.Tests.csproj --force-evaluate

      - name: Run server recovery validation tests
        run: >-
          dotnet test ./PowerForge.Tests/PowerForge.Tests.csproj
          -c Release
          --no-restore
          --filter 'FullyQualifiedName~GitHubServerRecoveryValidation|FullyQualifiedName~ServerRecoverySecurityTests|FullyQualifiedName~ServerScaffoldTests'
