name: PowerForge Website Deploy

on:
  workflow_call:
    inputs:
      website_root:
        required: true
        type: string
      pipeline_config:
        required: true
        type: string
      source_ref:
        description: Optional caller repository ref to build instead of the event commit.
        required: false
        type: string
        default: ""
      site_output_path:
        required: false
        type: string
        default: ""
      post_deploy_pipeline_config:
        required: false
        type: string
        default: ""
      engine_mode:
        required: false
        type: string
        default: ""
      runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      timeout_minutes:
        required: false
        type: number
        default: 40
      build_timeout_minutes:
        required: false
        type: number
        default: 60
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      dotnet_workloads:
        description: Optional comma, semicolon, or whitespace-separated .NET workloads to install before running the website build pipeline.
        required: false
        type: string
        default: ""
      report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-deploy-reports"
      post_deploy_report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-post-deploy-reports"
      powerforge_lock_path:
        required: false
        type: string
        default: ""
      powerforge_repository:
        required: false
        type: string
        default: ""
      powerforge_ref:
        required: false
        type: string
        default: ""
      powerforge_repository_override:
        required: false
        type: string
        default: ""
      powerforge_ref_override:
        required: false
        type: string
        default: ""
      powerforge_tool_lock_path:
        required: false
        type: string
        default: ""
      powerforge_web_tag:
        required: false
        type: string
        default: ""
      require_seo_doctor_guardrail:
        required: false
        type: boolean
        default: true
      post_deploy_use_playwright_cache:
        required: false
        type: boolean
        default: false
      deployment_target:
        required: false
        type: string
        default: "github-pages"
      deployment_site:
        required: false
        type: string
        default: ""
      deployment_host:
        description: Explicit deployment host. Use the PowerForge Linux Site Deploy action when values come from a protected environment.
        required: false
        type: string
        default: ""
      deployment_user:
        description: Optional least-privileged deployment user. Defaults to the protected environment variable POWERFORGE_WEBSITE_DEPLOY_USER.
        required: false
        type: string
        default: ""
      deployment_port:
        description: Optional deployment SSH port. Zero resolves the protected environment variable POWERFORGE_WEBSITE_DEPLOY_PORT or port 22.
        required: false
        type: number
        default: 0
      deployment_environment:
        required: false
        type: string
        default: "production"
      deployment_cloudflare_zone:
        description: Optional Cloudflare zone name for an ephemeral deploy-time cache token.
        required: false
        type: string
        default: ""
      deployment_url:
        description: Public HTTPS origin. Required when deployment_target is linux.
        required: false
        type: string
        default: ""
      deployment_smoke_paths:
        required: false
        type: string
        default: "/"
      publisher_runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      deployment_artifact_retention_days:
        required: false
        type: number
        default: 7
    secrets:
      indexnow_key:
        required: false
      repository_read_token:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false
      deployment_cloudflare_api_token:
        required: false
      deployment_host:
        description: Optional masked deployment host from the caller's protected environment.
        required: false
      deployment_ssh_private_key:
        required: false
      deployment_ssh_known_hosts:
        required: false

permissions:
  actions: write
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: powerforge-website-deploy-${{ github.repository }}-${{ inputs.website_root }}
  cancel-in-progress: false

jobs:
  guardrails:
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    timeout-minutes: 10
    outputs:
      workflow_repository: ${{ steps.guardrail_source.outputs.repository }}
      workflow_sha: ${{ steps.guardrail_source.outputs.sha }}
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: ${{ inputs.source_ref || github.event.pull_request.head.sha || github.sha }}

      - name: Resolve shared guardrail source
        id: guardrail_source
        shell: pwsh
        env:
          POWERFORGE_WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          POWERFORGE_WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          $repository = [string]$env:POWERFORGE_WORKFLOW_REPOSITORY
          $sha = [string]$env:POWERFORGE_WORKFLOW_SHA
          if ($repository -notmatch '^[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+$' -or
              $sha -notmatch '^(?:[a-fA-F0-9]{40}|[a-fA-F0-9]{64})$') {
            throw 'Unable to resolve the exact shared guardrail source.'
          }
          "repository=$repository" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "sha=$($sha.ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Checkout shared guardrail
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ steps.guardrail_source.outputs.repository }}
          ref: ${{ steps.guardrail_source.outputs.sha }}
          path: ./.powerforge-guardrails
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Validate deploy guardrails
        shell: pwsh
        env:
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          DEPLOYMENT_URL: ${{ inputs.deployment_url }}
          PIPELINE_CONFIG: ${{ inputs.pipeline_config }}
          REQUIRE_SEO_DOCTOR_GUARDRAIL: ${{ inputs.require_seo_doctor_guardrail }}
        run: ./.powerforge-guardrails/Build/Assert-PowerForgeWebsiteDeployGuardrails.ps1 -DeploymentTarget $env:DEPLOYMENT_TARGET -DeploymentUrl $env:DEPLOYMENT_URL -PipelineConfig $env:PIPELINE_CONFIG -RequireSeoDoctorGuardrail $env:REQUIRE_SEO_DOCTOR_GUARDRAIL

  build:
    needs: guardrails
    uses: ./.github/workflows/powerforge-website-run.yml
    with:
      website_root: ${{ inputs.website_root }}
      pipeline_config: ${{ inputs.pipeline_config }}
      source_ref: ${{ inputs.source_ref }}
      engine_mode: ${{ inputs.engine_mode }}
      runner_labels_json: ${{ inputs.runner_labels_json }}
      timeout_minutes: ${{ inputs.build_timeout_minutes }}
      dotnet_version: ${{ inputs.dotnet_version }}
      dotnet_workloads: ${{ inputs.dotnet_workloads }}
      report_artifact_name: ${{ inputs.report_artifact_name }}
      powerforge_lock_path: ${{ inputs.powerforge_lock_path }}
      powerforge_repository: ${{ inputs.powerforge_repository }}
      powerforge_ref: ${{ inputs.powerforge_ref }}
      powerforge_repository_override: ${{ inputs.powerforge_repository_override }}
      powerforge_ref_override: ${{ inputs.powerforge_ref_override }}
      powerforge_tool_lock_path: ${{ inputs.powerforge_tool_lock_path }}
      powerforge_web_tag: ${{ inputs.powerforge_web_tag }}
      pipeline_mode: ci
      use_playwright_cache: true
      upload_pages_artifact: ${{ inputs.deployment_target == 'github-pages' }}
      pages_artifact_path: ${{ inputs.site_output_path }}
      site_artifact_name: ${{ inputs.deployment_target == 'linux' && format('powerforge-site-{0}', inputs.deployment_site) || '' }}
      site_artifact_path: ${{ inputs.site_output_path }}
      site_artifact_retention_days: ${{ inputs.deployment_artifact_retention_days }}
    secrets:
      indexnow_key: ${{ secrets.indexnow_key }}
      repository_read_token: ${{ secrets.repository_read_token }}
      cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
      cloudflare_zone_id: ${{ secrets.cloudflare_zone_id }}

  deploy:
    if: ${{ inputs.deployment_target == 'github-pages' }}
    needs: build
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  deploy-linux:
    if: ${{ inputs.deployment_target == 'linux' }}
    needs: [build, guardrails]
    runs-on: ${{ fromJson(inputs.publisher_runner_labels_json) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment:
      name: ${{ inputs.deployment_environment }}
      url: ${{ inputs.deployment_url }}
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout exact caller source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.build.outputs.source_sha }}

      - name: Checkout shared deployment action
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ needs.guardrails.outputs.workflow_repository }}
          ref: ${{ needs.guardrails.outputs.workflow_sha }}
          path: ./.powerforge-deployment
          token: ${{ github.token }}
          fetch-depth: 1

      - name: Apply managed Cloudflare cache policy
        if: ${{ inputs.deployment_cloudflare_zone != '' }}
        uses: ./.powerforge-deployment/.github/actions/powerforge-cloudflare-cache-policy
        with:
          site-config: ${{ format('{0}/site.json', inputs.website_root) }}
          zone-id: ${{ vars.CLOUDFLARE_ZONE_ID || secrets.cloudflare_zone_id }}
          api-token: ${{ secrets.deployment_cloudflare_api_token }}
          checkout-caller: "false"

      - name: Deploy validated Linux website artifact
        uses: ./.powerforge-deployment/.github/actions/powerforge-linux-site-deploy
        with:
          artifact-name: ${{ format('powerforge-site-{0}', inputs.deployment_site) }}
          deployment-site: ${{ inputs.deployment_site }}
          deployment-host: ${{ secrets.deployment_host || inputs.deployment_host || vars.POWERFORGE_WEBSITE_DEPLOY_HOST }}
          deployment-port: ${{ inputs.deployment_port || vars.POWERFORGE_WEBSITE_DEPLOY_PORT || 22 }}
          deployment-user: ${{ inputs.deployment_user || vars.POWERFORGE_WEBSITE_DEPLOY_USER || 'powerforge-deploy' }}
          deployment-cloudflare-zone: ${{ inputs.deployment_cloudflare_zone }}
          deployment-public-url: ${{ inputs.deployment_url }}
          deployment-smoke-paths: ${{ inputs.deployment_smoke_paths }}
          deployment-ssh-private-key: ${{ secrets.deployment_ssh_private_key }}
          deployment-ssh-known-hosts: ${{ secrets.deployment_ssh_known_hosts }}
          deployment-cloudflare-api-token: ${{ secrets.deployment_cloudflare_api_token }}
          cloudflare-zone-id: ${{ vars.CLOUDFLARE_ZONE_ID || secrets.cloudflare_zone_id }}
          source-repository: ${{ github.repository }}
          source-sha: ${{ needs.build.outputs.source_sha }}
          engine-mode: ${{ needs.build.outputs.engine_mode }}
          engine-repository: ${{ needs.build.outputs.engine_repository }}
          engine-ref: ${{ needs.build.outputs.engine_ref }}
          engine-sha: ${{ needs.build.outputs.engine_sha }}
          engine-asset: ${{ needs.build.outputs.engine_asset }}
          engine-asset-sha256: ${{ needs.build.outputs.engine_asset_sha256 }}

  post-deploy:
    if: ${{ always() && inputs.post_deploy_pipeline_config != '' && ((inputs.deployment_target == 'github-pages' && needs.deploy.result == 'success') || (inputs.deployment_target == 'linux' && needs.deploy-linux.result == 'success')) }}
    needs: [deploy, deploy-linux]
    uses: ./.github/workflows/powerforge-website-run.yml
    with:
      website_root: ${{ inputs.website_root }}
      pipeline_config: ${{ inputs.post_deploy_pipeline_config }}
      source_ref: ${{ inputs.source_ref }}
      engine_mode: ${{ inputs.engine_mode }}
      runner_labels_json: ${{ inputs.runner_labels_json }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      dotnet_version: ${{ inputs.dotnet_version }}
      report_artifact_name: ${{ inputs.post_deploy_report_artifact_name }}
      powerforge_lock_path: ${{ inputs.powerforge_lock_path }}
      powerforge_repository: ${{ inputs.powerforge_repository }}
      powerforge_ref: ${{ inputs.powerforge_ref }}
      powerforge_repository_override: ${{ inputs.powerforge_repository_override }}
      powerforge_ref_override: ${{ inputs.powerforge_ref_override }}
      powerforge_tool_lock_path: ${{ inputs.powerforge_tool_lock_path }}
      powerforge_web_tag: ${{ inputs.powerforge_web_tag }}
      pipeline_mode: ci
      use_playwright_cache: ${{ inputs.post_deploy_use_playwright_cache }}
    secrets:
      indexnow_key: ${{ secrets.indexnow_key }}
      repository_read_token: ${{ secrets.repository_read_token }}
      cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
      cloudflare_zone_id: ${{ secrets.cloudflare_zone_id }}
