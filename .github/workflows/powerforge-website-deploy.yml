name: PowerForge Website Deploy

on:
  workflow_call:
    inputs:
      website_root:
        required: true
        type: string
      pipeline_config:
        required: true
        type: string
      site_output_path:
        required: false
        type: string
        default: ""
      post_deploy_pipeline_config:
        required: false
        type: string
        default: ""
      engine_mode:
        required: false
        type: string
        default: ""
      runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      timeout_minutes:
        required: false
        type: number
        default: 40
      build_timeout_minutes:
        required: false
        type: number
        default: 60
      dotnet_version:
        required: false
        type: string
        default: "10.0.x"
      report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-deploy-reports"
      post_deploy_report_artifact_name:
        required: false
        type: string
        default: "powerforge-website-post-deploy-reports"
      powerforge_lock_path:
        required: false
        type: string
        default: ""
      powerforge_repository:
        required: false
        type: string
        default: ""
      powerforge_ref:
        required: false
        type: string
        default: ""
      powerforge_repository_override:
        required: false
        type: string
        default: ""
      powerforge_ref_override:
        required: false
        type: string
        default: ""
      powerforge_tool_lock_path:
        required: false
        type: string
        default: ""
      powerforge_web_tag:
        required: false
        type: string
        default: ""
      require_seo_doctor_guardrail:
        required: false
        type: boolean
        default: true
      post_deploy_use_playwright_cache:
        required: false
        type: boolean
        default: false
      deployment_target:
        required: false
        type: string
        default: "github-pages"
      deployment_site:
        required: false
        type: string
        default: ""
      deployment_host:
        required: false
        type: string
        default: ""
      deployment_user:
        required: false
        type: string
        default: "powerforge-deploy"
      deployment_port:
        required: false
        type: number
        default: 22
      deployment_environment:
        required: false
        type: string
        default: "production"
      deployment_cloudflare_zone:
        description: Optional Cloudflare zone name for an ephemeral deploy-time cache token.
        required: false
        type: string
        default: ""
      deployment_url:
        required: false
        type: string
        default: ""
      publisher_runner_labels_json:
        required: false
        type: string
        default: '["ubuntu-latest"]'
      deployment_artifact_retention_days:
        required: false
        type: number
        default: 7
    secrets:
      indexnow_key:
        required: false
      repository_read_token:
        required: false
      cloudflare_api_token:
        required: false
      cloudflare_zone_id:
        required: false
      deployment_cloudflare_api_token:
        required: false
      deployment_ssh_private_key:
        required: false
      deployment_ssh_known_hosts:
        required: false

permissions:
  actions: write
  contents: read
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: powerforge-website-deploy-${{ github.repository }}-${{ inputs.website_root }}
  cancel-in-progress: false

jobs:
  guardrails:
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    timeout-minutes: 10
    steps:
      - name: Checkout caller repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ github.token }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Validate deploy guardrails
        shell: pwsh
        env:
          DEPLOYMENT_TARGET: ${{ inputs.deployment_target }}
          PIPELINE_CONFIG: ${{ inputs.pipeline_config }}
          REQUIRE_SEO_DOCTOR_GUARDRAIL: ${{ inputs.require_seo_doctor_guardrail }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ($env:DEPLOYMENT_TARGET -notin @('github-pages', 'linux')) {
            throw "Unsupported deployment_target '$($env:DEPLOYMENT_TARGET)'. Expected github-pages or linux."
          }

          if ($env:REQUIRE_SEO_DOCTOR_GUARDRAIL -ne 'true') {
            Write-Host 'SEO doctor deploy guardrail disabled for this workflow call.'
            exit 0
          }

          function Get-ResolvedPipelineSteps {
            param(
              [Parameter(Mandatory = $true)]
              [string] $PipelinePath,

              [Parameter(Mandatory = $true)]
              [AllowEmptyCollection()]
              [System.Collections.Generic.HashSet[string]] $Visited
            )

            $resolvedPath = [System.IO.Path]::GetFullPath($PipelinePath)
            if (-not $Visited.Add($resolvedPath)) {
              return @()
            }

            if (-not (Test-Path -LiteralPath $resolvedPath)) {
              throw "Pipeline config not found: $resolvedPath"
            }

            $document = Get-Content -LiteralPath $resolvedPath -Raw | ConvertFrom-Json -AsHashtable
            $steps = @()

            $extendsPath = $null
            if ($document.ContainsKey('extends')) {
              $extendsPath = [string] $document['extends']
            }

            if (-not [string]::IsNullOrWhiteSpace($extendsPath)) {
              $parentConfig = Join-Path ([System.IO.Path]::GetDirectoryName($resolvedPath)) $extendsPath
              $steps += @(Get-ResolvedPipelineSteps -PipelinePath $parentConfig -Visited $Visited)
            }

            if ($document.ContainsKey('steps') -and $null -ne $document['steps']) {
              $steps += @($document['steps'])
            }

            return $steps
          }

          $pipelinePath = Join-Path (Get-Location) $env:PIPELINE_CONFIG
          $visited = [System.Collections.Generic.HashSet[string]]::new([System.StringComparer]::OrdinalIgnoreCase)
          $steps = @(Get-ResolvedPipelineSteps -PipelinePath $pipelinePath -Visited $visited)

          $seoDoctorSteps = @(
            $steps | Where-Object {
              $_ -is [System.Collections.IDictionary] -and
              $_.Contains('task') -and
              [string]::Equals([string] $_['task'], 'seo-doctor', [System.StringComparison]::OrdinalIgnoreCase)
            }
          )

          if ($seoDoctorSteps.Count -eq 0) {
            throw "Deploy guardrail requires a seo-doctor step in the resolved pipeline config chain before deployment. Add a gating seo-doctor step or set require_seo_doctor_guardrail to false for an intentional exception."
          }

          $gatingSeoDoctorSteps = @(
            $seoDoctorSteps | Where-Object {
              (($_.Contains('failOnWarnings')) -and ($_['failOnWarnings'] -eq $true)) -or
              (($_.Contains('failOnNewIssues')) -and ($_['failOnNewIssues'] -eq $true)) -or
              (($_.Contains('failOnNew')) -and ($_['failOnNew'] -eq $true))
            }
          )

          if ($gatingSeoDoctorSteps.Count -eq 0) {
            throw "Deploy guardrail found seo-doctor, but none of the resolved seo-doctor steps are configured to gate deploys. Set failOnWarnings or failOnNewIssues, or opt out with require_seo_doctor_guardrail: false."
          }

          $fullyConfiguredSeoDoctorSteps = @(
            $gatingSeoDoctorSteps | Where-Object {
              $_.Contains('checkContentLeaks') -and ($_['checkContentLeaks'] -eq $true) -and
              $_.Contains('requireCanonical') -and ($_['requireCanonical'] -eq $true) -and
              $_.Contains('requireHreflang') -and ($_['requireHreflang'] -eq $true) -and
              $_.Contains('requireHreflangXDefault') -and ($_['requireHreflangXDefault'] -eq $true)
            }
          )

          if ($fullyConfiguredSeoDoctorSteps.Count -eq 0) {
            throw "Deploy guardrail requires at least one gating seo-doctor step with checkContentLeaks=true, requireCanonical=true, requireHreflang=true, and requireHreflangXDefault=true. This protects deploys from localized content leaks and canonical/hreflang regressions."
          }

          Write-Host "Validated $($seoDoctorSteps.Count) seo-doctor step(s); $($gatingSeoDoctorSteps.Count) gate deployment; $($fullyConfiguredSeoDoctorSteps.Count) enforce localized SEO/content-leak guardrails."

  build:
    needs: guardrails
    uses: ./.github/workflows/powerforge-website-run.yml
    with:
      website_root: ${{ inputs.website_root }}
      pipeline_config: ${{ inputs.pipeline_config }}
      engine_mode: ${{ inputs.engine_mode }}
      runner_labels_json: ${{ inputs.runner_labels_json }}
      timeout_minutes: ${{ inputs.build_timeout_minutes }}
      dotnet_version: ${{ inputs.dotnet_version }}
      report_artifact_name: ${{ inputs.report_artifact_name }}
      powerforge_lock_path: ${{ inputs.powerforge_lock_path }}
      powerforge_repository: ${{ inputs.powerforge_repository }}
      powerforge_ref: ${{ inputs.powerforge_ref }}
      powerforge_repository_override: ${{ inputs.powerforge_repository_override }}
      powerforge_ref_override: ${{ inputs.powerforge_ref_override }}
      powerforge_tool_lock_path: ${{ inputs.powerforge_tool_lock_path }}
      powerforge_web_tag: ${{ inputs.powerforge_web_tag }}
      pipeline_mode: ci
      use_playwright_cache: true
      upload_pages_artifact: ${{ inputs.deployment_target == 'github-pages' }}
      pages_artifact_path: ${{ inputs.site_output_path }}
      site_artifact_name: ${{ inputs.deployment_target == 'linux' && format('powerforge-site-{0}', inputs.deployment_site) || '' }}
      site_artifact_path: ${{ inputs.site_output_path }}
      site_artifact_retention_days: ${{ inputs.deployment_artifact_retention_days }}
    secrets:
      indexnow_key: ${{ secrets.indexnow_key }}
      repository_read_token: ${{ secrets.repository_read_token }}
      cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
      cloudflare_zone_id: ${{ secrets.cloudflare_zone_id }}

  deploy:
    if: ${{ inputs.deployment_target == 'github-pages' }}
    needs: build
    runs-on: ${{ fromJson(inputs.runner_labels_json) }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  deploy-linux:
    if: ${{ inputs.deployment_target == 'linux' }}
    needs: build
    runs-on: ${{ fromJson(inputs.publisher_runner_labels_json) }}
    timeout-minutes: ${{ inputs.timeout_minutes }}
    environment:
      name: ${{ inputs.deployment_environment }}
      url: ${{ inputs.deployment_url }}
    steps:
      - name: Validate Linux deployment inputs
        shell: pwsh
        env:
          DEPLOYMENT_HOST: ${{ inputs.deployment_host }}
          DEPLOYMENT_PORT: ${{ inputs.deployment_port }}
          DEPLOYMENT_SITE: ${{ inputs.deployment_site }}
          DEPLOYMENT_USER: ${{ inputs.deployment_user }}
          DEPLOYMENT_CLOUDFLARE_ZONE: ${{ inputs.deployment_cloudflare_zone }}
          DEPLOYMENT_PRIVATE_KEY: ${{ secrets.deployment_ssh_private_key }}
          DEPLOYMENT_KNOWN_HOSTS: ${{ secrets.deployment_ssh_known_hosts }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.deployment_cloudflare_api_token }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.cloudflare_zone_id }}
        run: |
          $ErrorActionPreference = 'Stop'
          if ($env:DEPLOYMENT_SITE -notmatch '^[a-z0-9][a-z0-9.-]{0,62}$') {
            throw 'deployment_site must be a lowercase DNS-style site identifier.'
          }
          if ($env:DEPLOYMENT_HOST -notmatch '^[A-Za-z0-9][A-Za-z0-9.-]{0,252}$') {
            throw 'deployment_host must be a DNS name or IPv4 address.'
          }
          if ($env:DEPLOYMENT_USER -notmatch '^[a-z_][a-z0-9_-]{0,31}$') {
            throw 'deployment_user is not a valid Linux account name.'
          }
          $port = 0
          if (-not [int]::TryParse($env:DEPLOYMENT_PORT, [ref] $port) -or $port -lt 1 -or $port -gt 65535) {
            throw 'deployment_port must be an integer from 1 through 65535.'
          }
          if ([string]::IsNullOrWhiteSpace($env:DEPLOYMENT_PRIVATE_KEY)) {
            throw 'deployment_ssh_private_key is required for Linux deployment.'
          }
          if ([string]::IsNullOrWhiteSpace($env:DEPLOYMENT_KNOWN_HOSTS)) {
            throw 'deployment_ssh_known_hosts is required; host key scanning at deploy time is intentionally disabled.'
          }
          if (-not [string]::IsNullOrWhiteSpace($env:DEPLOYMENT_CLOUDFLARE_ZONE)) {
            if ($env:DEPLOYMENT_CLOUDFLARE_ZONE -notmatch '^[A-Za-z0-9.-]+$') {
              throw 'deployment_cloudflare_zone must be a DNS zone name.'
            }
            if ([string]::IsNullOrWhiteSpace($env:CLOUDFLARE_API_TOKEN)) {
              throw 'deployment_cloudflare_api_token is required when deployment_cloudflare_zone is configured.'
            }
          }

      - name: Download validated site artifact
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ format('powerforge-site-{0}', inputs.deployment_site) }}
          path: ${{ runner.temp }}/powerforge-site

      - name: Create deployment provenance
        shell: pwsh
        env:
          SOURCE_REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          ENGINE_REPOSITORY: ${{ needs.build.outputs.engine_repository }}
          ENGINE_SHA: ${{ needs.build.outputs.engine_sha }}
          ENGINE_MODE: ${{ needs.build.outputs.engine_mode }}
          ENGINE_REF: ${{ needs.build.outputs.engine_ref }}
          ENGINE_ASSET: ${{ needs.build.outputs.engine_asset }}
          ENGINE_ASSET_SHA256: ${{ needs.build.outputs.engine_asset_sha256 }}
        run: |
          $ErrorActionPreference = 'Stop'
          $artifactPath = Join-Path $env:RUNNER_TEMP 'powerforge-site/artifact.tar'
          if (-not (Test-Path -LiteralPath $artifactPath -PathType Leaf)) {
            throw "Downloaded site artifact not found: $artifactPath"
          }
          $metadata = [ordered]@{
            schemaVersion = 1
            sourceRepository = $env:SOURCE_REPOSITORY
            sourceSha = $env:SOURCE_SHA
            engineMode = $env:ENGINE_MODE
            engineRepository = $env:ENGINE_REPOSITORY
            engineRef = $env:ENGINE_REF
            workflowRunId = '${{ github.run_id }}'
            workflowRunAttempt = '${{ github.run_attempt }}'
            artifactSha256 = (Get-FileHash -LiteralPath $artifactPath -Algorithm SHA256).Hash.ToLowerInvariant()
            deployedAtUtc = [DateTimeOffset]::UtcNow.ToString('O')
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ENGINE_SHA)) {
            $metadata.engineSha = $env:ENGINE_SHA
          }
          if (-not [string]::IsNullOrWhiteSpace($env:ENGINE_ASSET)) {
            $metadata.engineAsset = $env:ENGINE_ASSET
            $metadata.engineAssetSha256 = $env:ENGINE_ASSET_SHA256
          }
          $metadata | ConvertTo-Json | Set-Content -LiteralPath (Join-Path $env:RUNNER_TEMP 'powerforge-site/deployment.json') -Encoding utf8NoBOM

      - name: Publish and promote Linux release
        shell: pwsh
        env:
          DEPLOYMENT_HOST: ${{ inputs.deployment_host }}
          DEPLOYMENT_PORT: ${{ inputs.deployment_port }}
          DEPLOYMENT_SITE: ${{ inputs.deployment_site }}
          DEPLOYMENT_USER: ${{ inputs.deployment_user }}
          DEPLOYMENT_CLOUDFLARE_ZONE: ${{ inputs.deployment_cloudflare_zone }}
          DEPLOYMENT_PRIVATE_KEY: ${{ secrets.deployment_ssh_private_key }}
          DEPLOYMENT_KNOWN_HOSTS: ${{ secrets.deployment_ssh_known_hosts }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.deployment_cloudflare_api_token }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.cloudflare_zone_id }}
        run: |
          $ErrorActionPreference = 'Stop'
          $sshRoot = Join-Path $env:RUNNER_TEMP 'powerforge-deployment-ssh'
          New-Item -ItemType Directory -Force -Path $sshRoot | Out-Null
          $keyPath = Join-Path $sshRoot 'id_ed25519'
          $knownHostsPath = Join-Path $sshRoot 'known_hosts'
          Set-Content -LiteralPath $keyPath -Value $env:DEPLOYMENT_PRIVATE_KEY -Encoding utf8NoBOM
          Set-Content -LiteralPath $knownHostsPath -Value $env:DEPLOYMENT_KNOWN_HOSTS -Encoding utf8NoBOM
          chmod 700 $sshRoot
          chmod 600 $keyPath $knownHostsPath

          $deploymentSources = @(
            (Join-Path $env:RUNNER_TEMP 'powerforge-site/artifact.tar')
            (Join-Path $env:RUNNER_TEMP 'powerforge-site/deployment.json')
          )
          if (-not [string]::IsNullOrWhiteSpace($env:DEPLOYMENT_CLOUDFLARE_ZONE)) {
            $zoneId = [string]$env:CLOUDFLARE_ZONE_ID
            if ([string]::IsNullOrWhiteSpace($zoneId)) {
              $headers = @{ Authorization = "Bearer $($env:CLOUDFLARE_API_TOKEN)" }
              $zoneName = [Uri]::EscapeDataString($env:DEPLOYMENT_CLOUDFLARE_ZONE)
              $zoneResponse = Invoke-RestMethod -Method Get -Uri "https://api.cloudflare.com/client/v4/zones?name=$zoneName&status=active&per_page=5" -Headers $headers
              if (-not $zoneResponse.success -or @($zoneResponse.result).Count -ne 1) {
                throw "Cloudflare did not return exactly one active zone for '$($env:DEPLOYMENT_CLOUDFLARE_ZONE)'."
              }
              $zoneId = [string]$zoneResponse.result[0].id
            }
            if ($zoneId -notmatch '^[A-Fa-f0-9]{32}$') {
              throw 'cloudflare_zone_id is invalid and zone discovery did not return a valid id.'
            }
            $cloudflareTokenPath = Join-Path $sshRoot 'cloudflare-api.token'
            $cloudflareZonePath = Join-Path $sshRoot 'cloudflare-zone-id'
            Set-Content -LiteralPath $cloudflareTokenPath -Value $env:CLOUDFLARE_API_TOKEN -Encoding utf8NoBOM -NoNewline
            Set-Content -LiteralPath $cloudflareZonePath -Value $zoneId.ToLowerInvariant() -Encoding ascii -NoNewline
            chmod 600 $cloudflareTokenPath $cloudflareZonePath
            $deploymentSources += $cloudflareTokenPath, $cloudflareZonePath
          }

          $remoteBase = "/tmp/powerforge-${{ github.run_id }}-${{ github.run_attempt }}-$($env:DEPLOYMENT_SITE)"
          $target = "$($env:DEPLOYMENT_USER)@$($env:DEPLOYMENT_HOST)"
          $sshOptions = @('-i', $keyPath, '-o', 'BatchMode=yes', '-o', 'StrictHostKeyChecking=yes', '-o', "UserKnownHostsFile=$knownHostsPath")
          $scpArgs = @('-P', $env:DEPLOYMENT_PORT) + $sshOptions + $deploymentSources + @("${target}:${remoteBase}/")
          ssh @sshOptions -p $env:DEPLOYMENT_PORT $target "install -d -m 0700 '$remoteBase'"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          scp @scpArgs
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ssh @sshOptions -p $env:DEPLOYMENT_PORT $target "sudo /usr/local/sbin/powerforge-site-deploy --site '$($env:DEPLOYMENT_SITE)' --archive '$remoteBase/artifact.tar' --metadata '$remoteBase/deployment.json'"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Cleanup deployment credentials and remote staging
        if: ${{ always() }}
        continue-on-error: true
        shell: pwsh
        env:
          DEPLOYMENT_HOST: ${{ inputs.deployment_host }}
          DEPLOYMENT_PORT: ${{ inputs.deployment_port }}
          DEPLOYMENT_USER: ${{ inputs.deployment_user }}
        run: |
          $sshRoot = Join-Path $env:RUNNER_TEMP 'powerforge-deployment-ssh'
          $keyPath = Join-Path $sshRoot 'id_ed25519'
          $knownHostsPath = Join-Path $sshRoot 'known_hosts'
          $remoteBase = "/tmp/powerforge-${{ github.run_id }}-${{ github.run_attempt }}-${{ inputs.deployment_site }}"
          $target = "$($env:DEPLOYMENT_USER)@$($env:DEPLOYMENT_HOST)"
          try {
            if ((Test-Path -LiteralPath $keyPath) -and (Test-Path -LiteralPath $knownHostsPath)) {
              ssh -i $keyPath -o BatchMode=yes -o StrictHostKeyChecking=yes -o "UserKnownHostsFile=$knownHostsPath" -p $env:DEPLOYMENT_PORT $target "rm -rf -- '$remoteBase'"
            }
          } finally {
            if (Test-Path -LiteralPath $sshRoot) {
              Remove-Item -LiteralPath $sshRoot -Recurse -Force
            }
          }

  post-deploy:
    if: ${{ always() && inputs.post_deploy_pipeline_config != '' && ((inputs.deployment_target == 'github-pages' && needs.deploy.result == 'success') || (inputs.deployment_target == 'linux' && needs.deploy-linux.result == 'success')) }}
    needs: [deploy, deploy-linux]
    uses: ./.github/workflows/powerforge-website-run.yml
    with:
      website_root: ${{ inputs.website_root }}
      pipeline_config: ${{ inputs.post_deploy_pipeline_config }}
      engine_mode: ${{ inputs.engine_mode }}
      runner_labels_json: ${{ inputs.runner_labels_json }}
      timeout_minutes: ${{ inputs.timeout_minutes }}
      dotnet_version: ${{ inputs.dotnet_version }}
      report_artifact_name: ${{ inputs.post_deploy_report_artifact_name }}
      powerforge_lock_path: ${{ inputs.powerforge_lock_path }}
      powerforge_repository: ${{ inputs.powerforge_repository }}
      powerforge_ref: ${{ inputs.powerforge_ref }}
      powerforge_repository_override: ${{ inputs.powerforge_repository_override }}
      powerforge_ref_override: ${{ inputs.powerforge_ref_override }}
      powerforge_tool_lock_path: ${{ inputs.powerforge_tool_lock_path }}
      powerforge_web_tag: ${{ inputs.powerforge_web_tag }}
      pipeline_mode: ci
      use_playwright_cache: ${{ inputs.post_deploy_use_playwright_cache }}
    secrets:
      indexnow_key: ${{ secrets.indexnow_key }}
      repository_read_token: ${{ secrets.repository_read_token }}
      cloudflare_api_token: ${{ secrets.cloudflare_api_token }}
      cloudflare_zone_id: ${{ secrets.cloudflare_zone_id }}
